name: Deploy Frontend to Cloud Run (Separate Service)

on:
  push:
    branches:
      - main
      - staging
      - develop
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend-cloudrun.yml'
  workflow_dispatch:

env:
  REGISTRY: us-central1-docker.pkg.dev
  IMAGE_NAME: pavilion-frontend
  REPOSITORY: pavilion-agentic-app
  PROJECT_ID: ${{ secrets.GOOGLE_PROJECT_ID }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          version: 'latest'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGISTRY }}

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "ENVIRONMENT=production" >> $GITHUB_OUTPUT
            echo "SERVICE_NAME=pavilion-frontend-prod" >> $GITHUB_OUTPUT
            echo "REGION=us-central1" >> $GITHUB_OUTPUT
            echo "API_URL=https://pavilion-api-prod-lrr233iikq-uc.a.run.app/api" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            echo "ENVIRONMENT=staging" >> $GITHUB_OUTPUT
            echo "SERVICE_NAME=pavilion-frontend-staging" >> $GITHUB_OUTPUT
            echo "REGION=us-central1" >> $GITHUB_OUTPUT
            echo "API_URL=https://pavilion-api-staging-lrr233iikq-uc.a.run.app/api" >> $GITHUB_OUTPUT
          else
            echo "ENVIRONMENT=development" >> $GITHUB_OUTPUT
            echo "SERVICE_NAME=pavilion-frontend-dev" >> $GITHUB_OUTPUT
            echo "REGION=us-central1" >> $GITHUB_OUTPUT
            echo "API_URL=https://pavilion-api-dev-lrr233iikq-uc.a.run.app/api" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker image
        run: |
          PROJECT_ID="$(echo -n "${{ env.PROJECT_ID }}" | tr -d '[:space:]')"
          IMAGE_TAG="${{ env.REGISTRY }}/${PROJECT_ID}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          IMAGE_TAG_LATEST="${{ env.REGISTRY }}/${PROJECT_ID}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest"

          docker build \
            --build-arg VITE_API_BASE_URL=${{ steps.env.outputs.API_URL }} \
            --build-arg VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }} \
            -t "${IMAGE_TAG}" \
            -t "${IMAGE_TAG_LATEST}" \
            -f docker/Dockerfile.frontend \
            .

      - name: Push Docker image
        run: |
          PROJECT_ID="$(echo -n "${{ env.PROJECT_ID }}" | tr -d '[:space:]')"
          docker push "${{ env.REGISTRY }}/${PROJECT_ID}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker push "${{ env.REGISTRY }}/${PROJECT_ID}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest"

      - name: Deploy to Cloud Run
        run: |
          PROJECT_ID="$(echo -n "${{ env.PROJECT_ID }}" | tr -d '[:space:]')"

          echo "Deploying frontend to ${{ steps.env.outputs.SERVICE_NAME }} in ${{ steps.env.outputs.REGION }}"

          gcloud run deploy ${{ steps.env.outputs.SERVICE_NAME }} \
            --image "${{ env.REGISTRY }}/${PROJECT_ID}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" \
            --platform managed \
            --region ${{ steps.env.outputs.REGION }} \
            --project ${PROJECT_ID} \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --timeout 60 \
            --max-instances 50 \
            --min-instances 1 \
            --set-env-vars "NODE_ENV=${{ steps.env.outputs.ENVIRONMENT }}"

      - name: Get service URL
        run: |
          PROJECT_ID="$(echo -n "${{ env.PROJECT_ID }}" | tr -d '[:space:]')"
          SERVICE_URL=$(gcloud run services describe ${{ steps.env.outputs.SERVICE_NAME }} \
            --platform managed \
            --region ${{ steps.env.outputs.REGION }} \
            --project ${PROJECT_ID} \
            --format='value(status.url)')
          echo "Frontend deployed at: $SERVICE_URL"

      - name: Deployment complete
        run: |
          echo "✓ Frontend deployment verified by gcloud"
          echo "Service is now serving 100% of traffic"
