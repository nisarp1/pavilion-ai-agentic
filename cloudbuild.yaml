# Cloud Build — Pavilion AI main app CI/CD
# Triggered on push to main → builds one image → deploys web + worker + beat
#
# Required substitutions (set in Cloud Build trigger UI):
#   _PROJECT_ID        : pavilion-ai-agentic-v2
#   _REGION            : asia-south1
#   _CLOUD_SQL_INSTANCE: pavilion-ai-agentic-v2:asia-south1:pavilion-newsai-db
#   _GCS_BUCKET        : pavilion-newsai-media
#   _VITE_GOOGLE_CLIENT_ID: (your Google OAuth client ID)
#
# Redis URL and all secrets are stored in Secret Manager — no substitutions needed.

substitutions:
  _PROJECT_ID: 'pavilion-ai-agentic-v2'
  _REGION: 'asia-south1'
  _REPO: 'asia-south1-docker.pkg.dev/pavilion-ai-agentic-v2/pavilion-images'
  _CLOUD_SQL_INSTANCE: 'pavilion-ai-agentic-v2:asia-south1:pavilion-newsai-db'
  _GCS_BUCKET: 'pavilion-newsai-media'
  _VITE_GOOGLE_CLIENT_ID: '608132621768-h6d2e93tnh8c03an2shr0nig0go8a5h9.apps.googleusercontent.com'
  _IMAGE: 'asia-south1-docker.pkg.dev/pavilion-ai-agentic-v2/pavilion-images/pavilion-app'
  # Renderer URL — update after first renderer deploy
  _RENDERER_URL: 'https://pavilion-renderer-replace-me.a.run.app'
  # Allowed hosts — add your Cloud Run URL after first deploy
  _ALLOWED_HOSTS: 'newsai.pavilionend.in'

steps:
  # ── 0. Authenticate Docker to Artifact Registry (required for 2nd-gen triggers) ─
  - id: docker-auth
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args: ['auth', 'configure-docker', 'asia-south1-docker.pkg.dev', '--quiet']

  # ── 1. Build the unified app image ───────────────────────────────────────────
  - id: build
    name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '--file=docker/Dockerfile.cloudrun'
      - '--tag=$_IMAGE:$SHORT_SHA'
      - '--tag=$_IMAGE:latest'
      - '--cache-from=$_IMAGE:latest'
      - '--build-arg=VITE_API_BASE_URL=/api'
      - '--build-arg=VITE_GOOGLE_CLIENT_ID=$_VITE_GOOGLE_CLIENT_ID'
      - '.'
    timeout: '1200s'
    waitFor: ['docker-auth']

  # ── 2. Push image ─────────────────────────────────────────────────────────────
  - id: push-sha
    name: 'gcr.io/cloud-builders/docker'
    args: ['push', '$_IMAGE:$SHORT_SHA']
    waitFor: ['build']

  - id: push-latest
    name: 'gcr.io/cloud-builders/docker'
    args: ['push', '$_IMAGE:latest']
    waitFor: ['build']

  # ── 3a. Deploy web service ────────────────────────────────────────────────────
  - id: deploy-web
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - pavilion-web
      - '--image=$_IMAGE:$SHORT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--service-account=pavilion-cloudrun@$_PROJECT_ID.iam.gserviceaccount.com'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=1'
      - '--max-instances=10'
      - '--concurrency=80'
      - '--timeout=300s'
      - '--port=8080'
      - '--add-cloudsql-instances=$_CLOUD_SQL_INSTANCE'
      - '--set-env-vars=ENVIRONMENT=production,DEBUG=False,PAVILION_MODE=web,PORT=8080'
      - '--set-env-vars=GCS_BUCKET_NAME=$_GCS_BUCKET'
      - '--set-env-vars=CLOUD_RUN_RENDERER_URL=$_RENDERER_URL'
      - '--set-env-vars=CLOUD_SQL_INSTANCE=$_CLOUD_SQL_INSTANCE'
      - '--set-env-vars=ALLOWED_HOSTS=$_ALLOWED_HOSTS'
      - '--set-env-vars=FRONTEND_URL=https://newsai.pavilionend.in'
      - '--set-env-vars=CORS_ALLOWED_ORIGINS=https://newsai.pavilionend.in'
      - '--set-env-vars=GEMINI_MODEL=vertex_ai/gemini-2.5-flash'
      - '--set-env-vars=VERTEX_PROJECT=pavilion-ai-agentic-v2,VERTEX_LOCATION=us-central1'
      - '--set-env-vars=VERTEXAI_PROJECT=pavilion-ai-agentic-v2,VERTEXAI_LOCATION=us-central1'
      - '--set-env-vars=ELEVENLABS_MALAYALAM_VOICE_ID=iP95p4xoKVk53GoZ742B'
      - '--set-secrets=SECRET_KEY=pavilion-secret-key:latest'
      - '--set-secrets=DB_USER=pavilion-db-user:latest'
      - '--set-secrets=DB_PASSWORD=pavilion-db-password:latest'
      - '--set-secrets=DB_NAME=pavilion-db-name:latest'
      - '--set-secrets=REDIS_URL=pavilion-redis-url:latest'
      - '--set-secrets=REDIS_CACHE_URL=pavilion-redis-cache-url:latest'
      - '--set-secrets=GEMINI_API_KEY=pavilion-gemini-api-key:latest'
      - '--set-secrets=GOOGLE_CREDENTIALS_JSON=pavilion-google-credentials-json:latest'
      - '--set-secrets=ELEVENLABS_API_KEY=pavilion-elevenlabs-api-key:latest'
      - '--set-secrets=GOOGLE_CUSTOM_SEARCH_API_KEY=pavilion-custom-search-api-key:latest'
      - '--set-secrets=GOOGLE_CUSTOM_SEARCH_ENGINE_ID=pavilion-custom-search-engine-id:latest'
      - '--set-secrets=GOOGLE_OAUTH_CLIENT_ID=pavilion-google-oauth-client-id:latest'
    waitFor: ['push-sha']

  # ── 3b. Deploy worker service ─────────────────────────────────────────────────
  - id: deploy-worker
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - pavilion-worker
      - '--image=$_IMAGE:$SHORT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      - '--service-account=pavilion-cloudrun@$_PROJECT_ID.iam.gserviceaccount.com'
      - '--memory=2Gi'
      - '--cpu=1'
      - '--min-instances=1'
      - '--max-instances=3'
      - '--concurrency=1'
      - '--timeout=3600s'
      - '--add-cloudsql-instances=$_CLOUD_SQL_INSTANCE'
      - '--set-env-vars=ENVIRONMENT=production,DEBUG=False,PAVILION_MODE=worker'
      - '--set-env-vars=GCS_BUCKET_NAME=$_GCS_BUCKET'
      - '--set-env-vars=CLOUD_RUN_RENDERER_URL=$_RENDERER_URL'
      - '--set-env-vars=CLOUD_SQL_INSTANCE=$_CLOUD_SQL_INSTANCE'
      - '--set-env-vars=GEMINI_MODEL=vertex_ai/gemini-2.5-flash'
      - '--set-env-vars=VERTEX_PROJECT=pavilion-ai-agentic-v2,VERTEX_LOCATION=us-central1'
      - '--set-env-vars=VERTEXAI_PROJECT=pavilion-ai-agentic-v2,VERTEXAI_LOCATION=us-central1'
      - '--set-env-vars=ELEVENLABS_MALAYALAM_VOICE_ID=iP95p4xoKVk53GoZ742B'
      - '--set-secrets=SECRET_KEY=pavilion-secret-key:latest'
      - '--set-secrets=DB_USER=pavilion-db-user:latest'
      - '--set-secrets=DB_PASSWORD=pavilion-db-password:latest'
      - '--set-secrets=DB_NAME=pavilion-db-name:latest'
      - '--set-secrets=REDIS_URL=pavilion-redis-url:latest'
      - '--set-secrets=REDIS_CACHE_URL=pavilion-redis-cache-url:latest'
      - '--set-secrets=GEMINI_API_KEY=pavilion-gemini-api-key:latest'
      - '--set-secrets=GOOGLE_CREDENTIALS_JSON=pavilion-google-credentials-json:latest'
      - '--set-secrets=ELEVENLABS_API_KEY=pavilion-elevenlabs-api-key:latest'
      - '--set-secrets=GOOGLE_CUSTOM_SEARCH_API_KEY=pavilion-custom-search-api-key:latest'
      - '--set-secrets=GOOGLE_CUSTOM_SEARCH_ENGINE_ID=pavilion-custom-search-engine-id:latest'
    waitFor: ['push-sha']

  # ── 3c. Deploy beat service ───────────────────────────────────────────────────
  - id: deploy-beat
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - pavilion-beat
      - '--image=$_IMAGE:$SHORT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      - '--service-account=pavilion-cloudrun@$_PROJECT_ID.iam.gserviceaccount.com'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=1'
      - '--max-instances=1'
      - '--concurrency=1'
      - '--timeout=3600s'
      - '--add-cloudsql-instances=$_CLOUD_SQL_INSTANCE'
      - '--set-env-vars=ENVIRONMENT=production,DEBUG=False,PAVILION_MODE=beat'
      - '--set-env-vars=CLOUD_SQL_INSTANCE=$_CLOUD_SQL_INSTANCE'
      - '--set-secrets=SECRET_KEY=pavilion-secret-key:latest'
      - '--set-secrets=DB_USER=pavilion-db-user:latest'
      - '--set-secrets=DB_PASSWORD=pavilion-db-password:latest'
      - '--set-secrets=DB_NAME=pavilion-db-name:latest'
      - '--set-secrets=REDIS_URL=pavilion-redis-url:latest'
      - '--set-secrets=REDIS_CACHE_URL=pavilion-redis-cache-url:latest'
    waitFor: ['push-sha']

images:
  - '$_IMAGE:$SHORT_SHA'
  - '$_IMAGE:latest'

timeout: '2400s'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
