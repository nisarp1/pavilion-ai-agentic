name: Deploy Remotion Renderer

on:
  push:
    branches:
      - main
    paths:
      - 'remotion-renderer/**'
  workflow_dispatch:

env:
  REGISTRY: us-central1-docker.pkg.dev
  REPOSITORY: pavilion-agentic-app
  IMAGE_NAME: pavilion-remotion-renderer
  SERVICE_NAME: pavilion-remotion-renderer
  REGION: us-central1
  GCS_BUCKET: pavilion-media

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }}

      - name: Build Docker image
        run: |
          PROJECT_ID="$(echo -n "${{ secrets.GOOGLE_PROJECT_ID }}" | tr -d '[:space:]')"
          IMAGE="${{ env.REGISTRY }}/${PROJECT_ID}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}"
          docker build \
            -t "${IMAGE}:${{ github.sha }}" \
            -t "${IMAGE}:latest" \
            remotion-renderer/

      - name: Push Docker image
        run: |
          PROJECT_ID="$(echo -n "${{ secrets.GOOGLE_PROJECT_ID }}" | tr -d '[:space:]')"
          IMAGE="${{ env.REGISTRY }}/${PROJECT_ID}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}"
          docker push "${IMAGE}:${{ github.sha }}"
          docker push "${IMAGE}:latest"

      - name: Deploy to Cloud Run
        run: |
          PROJECT_ID="$(echo -n "${{ secrets.GOOGLE_PROJECT_ID }}" | tr -d '[:space:]')"
          IMAGE="${{ env.REGISTRY }}/${PROJECT_ID}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image "${IMAGE}" \
            --platform managed \
            --region ${{ env.REGION }} \
            --project "${PROJECT_ID}" \
            --memory 4Gi \
            --cpu 4 \
            --timeout 600 \
            --concurrency 1 \
            --max-instances 10 \
            --no-allow-unauthenticated \
            --set-env-vars "GCS_BUCKET_NAME=${{ env.GCS_BUCKET }}" \
            --service-account=pavilion-agentic@${PROJECT_ID}.iam.gserviceaccount.com

      - name: Get and print service URL
        run: |
          PROJECT_ID="$(echo -n "${{ secrets.GOOGLE_PROJECT_ID }}" | tr -d '[:space:]')"
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --project "${PROJECT_ID}" \
            --format='value(status.url)')
          echo "Remotion renderer deployed at: ${URL}"
          echo "Set this in backend/.env: CLOUD_RUN_RENDERER_URL=${URL}"
