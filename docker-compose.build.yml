version: '3.8'

# DEV BUILD STACK — runs alongside the staff production stack without conflict.
#
# Port mapping (host → container):
#   postgres   5433 → 5432
#   redis      6380 → 6379
#   remotion   3004 → 8080
#   django     8001 → 8000
#   frontend   3002 → 3001
#   flower     5556 → 5555
#
# All containers are prefixed pavilion-*-build so they never clash with
# the pavilion-*-dev containers in /home/nisar/pavilion-ai-agentic.
#
# Usage:
#   docker-compose -f docker-compose.build.yml up -d       # start
#   docker-compose -f docker-compose.build.yml logs -f     # tail logs
#   docker-compose -f docker-compose.build.yml down        # stop
#   docker-compose -f docker-compose.build.yml exec django python backend/manage.py shell

services:

  postgres:
    image: postgres:15-alpine
    container_name: pavilion-postgres-build
    environment:
      POSTGRES_DB: pavilion_agentic_build
      POSTGRES_USER: pavilion_user
      POSTGRES_PASSWORD: dev-password-change-in-production
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_build:/var/lib/postgresql/data
      - ./infrastructure/cloudsql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pavilion_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pavilion-build-network

  redis:
    image: redis:7-alpine
    container_name: pavilion-redis-build
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pavilion-build-network

  remotion-renderer:
    image: pavilion-ai-agentic-remotion-renderer:latest
    container_name: pavilion-remotion-build
    environment:
      GCS_BUCKET_NAME: pavilion-media
      GOOGLE_APPLICATION_CREDENTIALS: /app/.gcp-secrets/service-account-key.json
      PORT: '8080'
    ports:
      - "3004:8080"
    volumes:
      - ./.gcp-secrets:/app/.gcp-secrets:ro
    networks:
      - pavilion-build-network

  celery:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: pavilion-celery-build
    command: celery -A pavilion_gemini worker --loglevel=info -Q default,social,pipeline,celery
    environment:
      DJANGO_SETTINGS_MODULE: pavilion_gemini.settings
      DATABASE_URL: postgresql://pavilion_user:dev-password-change-in-production@postgres:5432/pavilion_agentic_build
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      REDIS_URL: redis://redis:6379/0
      REDIS_CACHE_URL: redis://redis:6379/1
      GOOGLE_APPLICATION_CREDENTIALS: /app/.gcp-secrets/service-account-key.json
      CLOUD_RUN_RENDERER_URL: http://remotion-renderer:8080
      DJANGO_INTERNAL_URL: http://django:8000
      GCS_BUCKET_NAME: pavilion-media
      ENVIRONMENT: development
      DEBUG: 'true'
    volumes:
      - .:/app
      - ./.gcp-secrets:/app/.gcp-secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      remotion-renderer:
        condition: service_started
    networks:
      - pavilion-build-network

  celery-beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: pavilion-celery-beat-build
    command: celery -A pavilion_gemini beat --loglevel=info --scheduler celery.beat.PersistentScheduler
    environment:
      DJANGO_SETTINGS_MODULE: pavilion_gemini.settings
      DATABASE_URL: postgresql://pavilion_user:dev-password-change-in-production@postgres:5432/pavilion_agentic_build
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      REDIS_URL: redis://redis:6379/0
      REDIS_CACHE_URL: redis://redis:6379/1
      GOOGLE_APPLICATION_CREDENTIALS: /app/.gcp-secrets/service-account-key.json
      ENVIRONMENT: development
      DEBUG: 'true'
    volumes:
      - .:/app
      - ./.gcp-secrets:/app/.gcp-secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pavilion-build-network

  django:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: pavilion-django-build
    command: >
      sh -c "python backend/manage.py migrate &&
             python backend/manage.py runserver 0.0.0.0:8000"
    environment:
      DJANGO_SETTINGS_MODULE: pavilion_gemini.settings
      DATABASE_URL: postgresql://pavilion_user:dev-password-change-in-production@postgres:5432/pavilion_agentic_build
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      REDIS_URL: redis://redis:6379/0
      REDIS_CACHE_URL: redis://redis:6379/1
      GOOGLE_APPLICATION_CREDENTIALS: /app/.gcp-secrets/service-account-key.json
      CLOUD_RUN_RENDERER_URL: http://remotion-renderer:8080
      GCS_BUCKET_NAME: pavilion-media
      ENVIRONMENT: development
      DEBUG: 'true'
      ALLOWED_HOSTS: '*'
      CORS_ALLOWED_ORIGINS: http://localhost:3002,http://127.0.0.1:3002,http://localhost:8001,http://127.0.0.1:8001
      CORS_ALLOW_ALL_ORIGINS: 'true'
    ports:
      - "8001:8000"
    volumes:
      - .:/app
      - ./.gcp-secrets:/app/.gcp-secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      remotion-renderer:
        condition: service_started
    networks:
      - pavilion-build-network
    stdin_open: true
    tty: true

  flower:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: pavilion-flower-build
    command: celery -A pavilion_gemini flower --port=5555
    environment:
      DJANGO_SETTINGS_MODULE: pavilion_gemini.settings
      DATABASE_URL: postgresql://pavilion_user:dev-password-change-in-production@postgres:5432/pavilion_agentic_build
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      ENVIRONMENT: development
    ports:
      - "5556:5555"
    volumes:
      - .:/app
    depends_on:
      - redis
    networks:
      - pavilion-build-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: pavilion-frontend-build
    environment:
      VITE_API_BASE_URL: /api
      VITE_ENVIRONMENT: development
      VITE_API_PROXY_TARGET: http://django:8000
    ports:
      - "3002:3001"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - django
    networks:
      - pavilion-build-network
    stdin_open: true

networks:
  pavilion-build-network:
    driver: bridge

volumes:
  postgres_data_build:
    driver: local
