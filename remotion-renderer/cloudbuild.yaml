# Google Cloud Build — build & push the Remotion renderer image
# Usage: gcloud builds submit --config cloudbuild.yaml .
#
# Required substitutions (set in Cloud Build trigger or pass via --substitutions):
#   _PROJECT_ID   : GCP project ID
#   _REGION       : Cloud Run region (e.g. asia-south1)
#   _SERVICE_NAME : Cloud Run service name (e.g. pavilion-remotion-renderer)
#   _GCS_BUCKET   : GCS bucket for rendered videos

substitutions:
  _PROJECT_ID: 'your-gcp-project-id'
  _REGION: 'asia-south1'
  _SERVICE_NAME: 'pavilion-remotion-renderer'
  _GCS_BUCKET: 'your-gcs-bucket-name'
  _IMAGE: 'gcr.io/$_PROJECT_ID/$_SERVICE_NAME'

steps:
  # 1. Build the Docker image (bundling happens inside)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '--tag=$_IMAGE:$SHORT_SHA'
      - '--tag=$_IMAGE:latest'
      - '--cache-from=$_IMAGE:latest'
      - '.'
    dir: '.'
    timeout: '1200s'

  # 2. Push both tags
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '$_IMAGE:$SHORT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '$_IMAGE:latest']

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - '$_SERVICE_NAME'
      - '--image=$_IMAGE:$SHORT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--memory=4Gi'
      - '--cpu=4'
      - '--timeout=600s'
      - '--concurrency=1'
      - '--max-instances=10'
      - '--no-allow-unauthenticated'
      - '--set-env-vars=GCS_BUCKET_NAME=$_GCS_BUCKET'

images:
  - '$_IMAGE:$SHORT_SHA'
  - '$_IMAGE:latest'

timeout: '1800s'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
